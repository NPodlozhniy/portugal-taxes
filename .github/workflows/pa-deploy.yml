name: PythonAnywhere

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to PythonAnywhere
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: Pull latest code
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            https://npodlozhniy.pythonanywhere.com/deploy

      - name: Reload web app
        run: |
          curl -sf -X POST \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}" \
            https://www.pythonanywhere.com/api/v0/user/npodlozhniy/webapps/npodlozhniy.pythonanywhere.com/reload/
